name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go.sum

      - name: Build example binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o dist/bursthttp-example_${VERSION}_linux_amd64 ./examples/basic
          GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w" -o dist/bursthttp-example_${VERSION}_darwin_amd64 ./examples/basic
          GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o dist/bursthttp-example_${VERSION}_darwin_arm64 ./examples/basic
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o dist/bursthttp-example_${VERSION}_windows_amd64.exe ./examples/basic

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes/${{ github.ref_name }}.md
          files: dist/*
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
